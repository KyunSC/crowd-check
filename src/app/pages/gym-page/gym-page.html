<h1>Gym</h1>

@for (gym of gyms; track gym.id) {
  <div class="zone-list">
    @for (zone of gym.zones; track zone.id) {
      <div class="zone-item">
        <button class="zone-header" (click)="toggleZone(gym.id, zone.id)">
          <span class="zone-name">{{ zone.name }}</span>
          <span class="chevron" [class.open]="isZoneOpen(gym.id, zone.id)">▼</span>
        </button>

        @if (isZoneOpen(gym.id, zone.id)) {
          <app-floor-voting-panel [floorName]="zone.name"></app-floor-voting-panel>
        }
      </div>
    }
  </div>
}

<app-home-button></app-home-button>
