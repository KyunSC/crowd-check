<div class="panel">
  <app-crowd-meter [level]="crowdLevel()"></app-crowd-meter>
  <section class="vote-container">
    <app-vote-button label="👤" [value]="1" [selected]="pendingLevel() === 1" (voted)="pendingLevel.set($event)"></app-vote-button>
    <app-vote-button label="👤👤" [value]="2" [selected]="pendingLevel() === 2" (voted)="pendingLevel.set($event)"></app-vote-button>
    <app-vote-button label="👤👤👤" [value]="3" [selected]="pendingLevel() === 3" (voted)="pendingLevel.set($event)"></app-vote-button>
  </section>
  <app-confirm-button [disabled]="pendingLevel() === 0 || isSubmitting()" (confirmed)="onConfirm()"></app-confirm-button>
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }
</div>
